stages:
  - build
  - docker
variables:
  DOCKER_IMAGE_FRONTEND: bassem00/bsn-frontend
# ---- Build Frontend ----
build-frontend:
  stage: build
  image: node:22-alpine
  rules:
    - changes:
        - bsn-ui/**
        - docker/frontend/Dockerfile
        - docker-compose.yml
  script:
    - cd bsn-ui
    - npm ci
    - npm run build
    -
    # extract version from package.json
    - echo "FRONT_VERSION=$(jq -r '.version' package.json)" >> ../variables.env
  artifacts:
    paths:
      - bsn-ui/dist/
    expire_in: 24h
# ---- Docker Frontend ----
docker-build-frontend:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"   # faster Docker builds
  rules:
    - changes:
        - bsn-ui/**
        - docker/frontend/Dockerfile
        - docker-compose.yml
  needs: ["build-frontend"]
  before_script:
    - echo "Using Docker Hub user:$DOCKERHUB_USERNAME"
    # Use --password-stdin to avoid interactive login errors
    - echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  script:
    # Build Docker image using the Dockerfile
    - docker build -t $DOCKER_IMAGE_FRONTEND:$FRONT_VERSION -f docker/frontend/Dockerfile .
    - docker push $DOCKER_IMAGE_FRONTEND:$FRONT_VERSION
