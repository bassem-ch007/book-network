<div class="container-fluid card login-container">
  <h3 class="text-center">Login</h3>
  <hr>

  <!-- Error messages -->
  <div class="alert alert-danger" role="alert" *ngIf="errorMsg.length">
    <p *ngFor="let msg of errorMsg">{{ msg }}</p>
  </div>

  <!-- Email -->
  <div class="mb-3">
    <label for="login" class="form-label">Email address</label>
    <input [(ngModel)]="authRequest.email"
           type="email"
           class="form-control"
           id="login"
           placeholder="name@example.com">
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input [(ngModel)]="authRequest.password"
           type="password"
           class="form-control"
           id="password"
           placeholder="Password">
  </div>

  <!-- Buttons -->
  <div class="d-flex justify-content-between mb-3">
    <button (click)="login()" type="button" class="btn btn-primary">
      <em class="fas fa-sign-in"></em>&nbsp;Sign in
    </button>
    <div>
      Don't have an account?&nbsp;
      <button (click)="register()" type="button" class="btn btn-link">
        Register
      </button>
    </div>
  </div>
</div>
