version: '3.9'

services:
  postgres:
    container_name: postgres-sql-bsn
    image: postgres
    environment:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB: book_social_network
      PGDATA: /var/lib/postgresql/data
    volumes:
      - bsn_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - spring-demo
    restart: unless-stopped
  backend:
    build:
      context: ../
      dockerfile: ./local-testing/backend/Dockerfile
    container_name: proxy-bsn-backend
    ports:
      - "8088:8088"
    networks:
      - spring-demo
    depends_on:
      - postgres

  frontend:
    build:
      context: ../
      dockerfile: ./local-testing/frontend/Dockerfile
    container_name: proxy-bsn-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - spring-demo

  proxy:
    build:
      context: ./proxy
    container_name: bsn-proxy
    ports:
      - "2222:80"  # expose only this one for ngrok
    depends_on:
      - frontend
      - backend
    networks:
      - spring-demo

volumes:
  bsn_postgres:
    driver: local

networks:
  spring-demo:
    driver: bridge
